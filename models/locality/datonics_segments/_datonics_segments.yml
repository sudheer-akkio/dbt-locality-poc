version: 2

models:
  - name: int_datonics_segments_metadata
    description: |
      Pre-computed metadata for all datonics segments including parent-child relationships.
      This small table (~1191 segments) is used by all category processing models.
    columns:
      - name: record_type
        description: Either 'segment' (segment metadata) or 'parent_child' (relationship)
      - name: segment
        description: Datonics segment ID
      - name: segment_name
        description: Full hierarchical segment name (e.g., 'Automotive > Luxury > Owners')
      - name: category
        description: Top-level category (L1 value)
      - name: depth
        description: Hierarchy depth (1-5)
      - name: L1
        description: Level 1 segment name
      - name: L2
        description: Level 2 segment name
      - name: L3
        description: Level 3 segment name
      - name: L4
        description: Level 4 segment name
      - name: L5
        description: Level 5 segment name
      - name: parent_segment
        description: Parent segment ID (for parent_child records)
      - name: child_segment
        description: Child segment ID (for parent_child records)

  - name: datonics_segments_ip
    description: "Datonics segments for IP id_type. Grain: ({{ 'LOCALITY_ID' if var('env','staging') != 'staging' else 'AKKIO_ID' }}, SEGMENT_ID, SEGMENT_SOURCE)."
  - name: datonics_segments_aaid
    description: "Datonics segments for AAID id_type. Grain: ({{ 'LOCALITY_ID' if var('env','staging') != 'staging' else 'AKKIO_ID' }}, SEGMENT_ID, SEGMENT_SOURCE)."
  - name: datonics_segments_idfa
    description: "Datonics segments for IDFA id_type. Grain: ({{ 'LOCALITY_ID' if var('env','staging') != 'staging' else 'AKKIO_ID' }}, SEGMENT_ID, SEGMENT_SOURCE)."
  - name: datonics_segments_ctv
    description: "Datonics segments for CTV id_type. Grain: ({{ 'LOCALITY_ID' if var('env','staging') != 'staging' else 'AKKIO_ID' }}, SEGMENT_ID, SEGMENT_SOURCE)."